  - id: kfw_liabilities
    label: "KfW Group gross liabilities (federally guaranteed)"
    category: state_bank
    amount_local_bn: 545.4
    amount_pct_gdp: 12.67
    already_in_maastricht: false
    include_in_extended: true
    loss_given_default: 0.5
    source: "KfW Financial Report 2024 (balance sheet total 31 Dec 2024)"
    source_url: "https://www.kfw.de/PDF/Download-Center/Finanzpublikationen/PDF-Dokumente-Berichte-etc/3_Finanzberichte/KfW-Finanzbericht-2024-2.pdf"
    source_date: 2025-04-01
    notes: |
      Explicit federal guarantee (Gewährträgerhaftung + Anstaltslast
      under §1a KfW-Gesetz). Classified as public financial corporation
      under ESA 2010; excluded from S.13 general government, so NOT in
      Maastricht. Over 90% of funding is federal-guaranteed bonds.
      LGD 0.5 chosen as central case — KfW's loan book covers most of
      its liabilities, so real sovereign risk is the residual credit
      risk on that book, not the gross €545bn. Low case 0.2, high 1.0.

  - id: landesbanken_implicit
    label: "Landesbanken implicit owner support (no explicit guarantee)"
    category: guarantee
    amount_local_bn: 940.0
    amount_pct_gdp: 21.83
    already_in_maastricht: false
    include_in_extended: true
    loss_given_default: 0.1
    source: "Fitch peer credit analysis 2025 (BayernLB IR); aggregate LBBW/BayernLB/Helaba/NordLB/SaarLB"
    source_url: "https://www.bayernlb.de/internet/media/ir/downloads_1/investor_relations_3/ratingberichte/fitch/2025_20/fitch_peer_credit_analysis.pdf"
    source_date: 2025-02-01
    notes: |
      Anstaltslast/Gewährträgerhaftung ended July 2005 (grandfathered
      bonds now rolled off). NO explicit state guarantee on current
      Landesbank debt. Aggregate assets ~€940bn across LBBW €333bn,
      BayernLB €266bn, Helaba €208bn, NordLB €115bn, SaarLB €20bn.
      Contingent exposure is implicit Länder backstop — NordLB 2019
      bailout and HSH wind-down show the tail risk is real but small
      in expectation. LGD 0.1 is deliberately conservative.

  - id: hermes_export_credit
