    source_date: 2025-03-01
    notes: |
      Stock figure is order-of-magnitude (~€400bn) — annual report
      publishes new cover (€17.2bn in 2024) not outstanding stock.
      Historical loss rates are very low; LGD 0.1 captures the small
      residual tail.

  - id: esm_callable
