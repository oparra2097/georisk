extended_debt_estimate:
  low_pct_gdp: 67.6
  mid_pct_gdp: 74.0
  high_pct_gdp: 84.7
  method: |
    Low (67.6%): Maastricht 62.5 + KfW at LGD 0.2 (2.5pp) + Landesbank
    at LGD 0.05 (1.1pp) + Hermes at LGD 0.05 (0.5pp) + ESM excluded.
    Mid (74.0%): Maastricht 62.5 + KfW at LGD 0.5 (6.3pp) + Landesbank
    at LGD 0.1 (2.2pp) + Hermes at LGD 0.1 (0.9pp) + ESM/EFSF excluded.
    High (84.7%): Maastricht + KfW at LGD 1.0 (12.7pp) + Landesbank
    at LGD 0.15 (3.3pp) + Hermes at LGD 0.2 (1.9pp) + ESM/EFSF at
    LGD 0.5 (4.4pp).
    Anything above 85% requires additional justification (full KfW
    face ignores asset side; pension accrued entitlements are a
    different accounting concept).
  defensible_ceiling_pct_gdp: 75.0

