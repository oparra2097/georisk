    category: guarantee
    amount_local_bn: 400.0
    amount_pct_gdp: 9.29
    already_in_maastricht: false
    include_in_extended: true
    loss_given_default: 0.1
    source: "Bundeswirtschaftsministerium Export Credit Guarantees Annual Report 2024 (order of magnitude; precise stock not in public summary)"
