# Spain — Contingent Liability Stack (v2.0 AE rebuild)
#
# All figures verified via agent research April 2026.
#
# Key finding: Eurostat has progressively consolidated Spanish
# contingents (SAREB 2020, ADIF-AV 2013, ICO 2015, FROB always) so
# the shadow premium over Maastricht is small — ~2-4pp.

