extended_debt_estimate:
  low_pct_gdp: 102.3
  mid_pct_gdp: 103.7
  high_pct_gdp: 106.0
  method: |
    Low (102.3%): ADIF market+RENFE at LGD 0.25 + CESCE at LGD 0.1 +
    EFSF at LGD 0.05 + ESM excluded.
    Mid (103.7%): ADIF+RENFE at LGD 0.5 + CESCE at LGD 0.25 + EFSF/ESM
    excluded.
    High (106.0%): ADIF+RENFE at LGD 1.0 + CESCE at LGD 0.5 + EFSF at
    LGD 0.3 + ESM at LGD 0.25.
    Eurostat consolidation has already absorbed the main hidden items
    (SAREB, ADIF-AV, ICO, FROB), so the shadow envelope is modest.
  defensible_ceiling_pct_gdp: 106.0

