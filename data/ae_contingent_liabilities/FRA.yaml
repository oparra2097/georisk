    source_url: "https://www.ccomptes.fr/sites/default/files/2025-04/20250416-certification-comptes-Etat-exercice-2024.pdf"
    source_date: 2025-04-16
    notes: |
      Gross off-balance state engagements reported at €3,769bn in 2024
      — this aggregate includes future pension liabilities (largest
      item) plus explicit guarantees. Stripped-down explicit guarantees
      on private financing ~€200bn order of magnitude. Excluded from
      default extended total; toggle on for high-case only.

extended_debt_estimate:
  low_pct_gdp: 114.9
  mid_pct_gdp: 118.3
  high_pct_gdp: 125.0
  method: |
    Low (114.9%): Maastricht 113.0 + EDF net debt at LGD 0.4 (0.74pp)
    + SNCF ex-Réseau at LGD 0.8 (0.17pp) + Bpifrance at LGD 0.1 (0.14pp)
    + nuclear provisions excluded + CDC excluded.
    Mid (118.3%): adds EDF nuclear provisions at LGD 0.5 (0.92pp) +
    Bpifrance at LGD 0.25 (0.34pp) + higher EDF LGD.
    High (125%): mid plus CDC long-term at LGD 0.1 (0.51pp) +
    25% crystallisation of explicit state guarantees.
    Anything above 125% requires adding implicit pension liabilities,
    which is a different (accrual) accounting concept and NOT
    comparable to Maastricht gross debt.
  defensible_ceiling_pct_gdp: 120.0

_status: ready_for_review
