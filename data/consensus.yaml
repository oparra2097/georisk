# data/consensus.yaml
#
# Manually maintained bank-consensus commodity forecasts.
#
# !!! ILLUSTRATIVE SEED VALUES ONLY !!!
# Replace with actual published quarterly forecasts from Goldman Sachs,
# J.P. Morgan, UBS, Morgan Stanley, Citi, etc. when new research drops.
# Bank research is paywalled — paste numbers in by hand from the PDFs/emails.
#
# Schema:
#   <Commodity Name>:
#     - source: "Goldman Sachs"
#       published: YYYY-MM-DD     # report publication date
#       note: "Commodities Weekly - citation"
#       unit: "$/bbl"              # optional, informational
#       quarters:                  # forward quarterly forecasts
#         Q2_2026: 78
#         Q3_2026: 82
#         Q4_2026: 80
#         Q1_2027: 78
#       fy:                        # optional calendar-year forecasts
#         2026: 80
#         2027: 75
#
# Commodity names MUST match those in commodities_forecast.COMMODITIES
# (WTI Crude, Brent Crude, Natural Gas (HH), TTF Gas, Gold, Silver,
#  Platinum, Copper, Aluminum, Cocoa, Wheat, Soybeans, Coffee).
#
# As-of date (spot snapshot these forecasts are anchored against): 2026-04-22
# ─────────────────────────────────────────────────────────────────────────────

