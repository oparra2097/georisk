  (UMOA-Titres) as well as the debt held by the central bank (BCEAO)
  account for almost 87 percent of Guinea-Bissau's domestic debt at
  end-2022."
banking_system_claims_url: "https://www.imf.org/-/media/files/publications/cr/2025/english/1gnbea2025001-print-pdf.pdf"
