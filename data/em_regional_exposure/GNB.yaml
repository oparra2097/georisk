cross_border_share: 0.40
cross_border_share_method: order_of_magnitude
cross_border_share_source: |
  CR 25/167 doesn't split UMOA-Titres vs BCEAO holdings in the
  surfaced snippet. BCEAO portion is essentially a central-bank
  advance and not a cross-border commercial exposure. Without a
  split, 40% is a conservative estimate of the UMOA-Titres portion
  held by non-GNB WAEMU commercial banks.
cross_border_share_url: "https://www.imf.org/-/media/files/publications/cr/2025/english/1gnbea2025001-print-pdf.pdf"

regional_bank_exposure_usd_bn: 0.30           # 0.76 × 0.40
