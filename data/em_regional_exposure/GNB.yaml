include_in_shadow: true
loss_given_default: 1.0
double_count_check: |
  GNB financing is largely concessional external (multilateral via
  IDS). Regional XOF titres are a small residual but material for a
  $2bn economy.

notes: |
  Smallest WAEMU issuer but the 87% domestic-debt figure for
  UMOA-Titres + BCEAO combined shows how concentrated GNB financing
  is. Need the BCEAO/AUT split to graduate this.

