cross_border_share_source: |
  Togo First Jan-Sep 2024 breakdown of Togo domestic debt holdings:
    Togolese investors:  22.8%
    Ivorian investors:   24.8%
    Senegalese investors: 22.7%
    Other WAEMU / non-resident: 29.7%
  → 77.2% of DOMESTIC debt held outside Togo.
  Applied to total debt: 0.619 domestic × 0.772 non-Togolese = 0.478
  cross-border share of total debt. Rounded 0.48.
cross_border_share_url: "https://www.togofirst.com/en/investments/1611-15202-waemu-market-ivorian-investors-lead-togolese-domestic-debt-holdings"

