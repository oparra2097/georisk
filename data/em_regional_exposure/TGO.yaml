include_in_shadow: true
loss_given_default: 1.0
double_count_check: |
  CRITICAL CAVEAT: Lomé hosts Ecobank Transnational and Oragroup
  consolidated HQs. Ecobank SN / CI / BJ subsidiaries' sovereign
  books roll up to Lomé consolidation. The "22.8% Togolese" share
  in the Togo First data may over-state true Togolese-resident
  exposure because of this HQ consolidation. Handle with caution.

notes: |
  HIGH-IMPACT case: 19.6% of GDP is a material shadow adjustment.
  Cross-border share is the best-grounded of all 8 WAEMU countries
  thanks to Togo First's per-investor-country breakdown. Stock
  figure remains the gap. Lomé HQ effect requires bespoke
  treatment — consolidated parent books conflate jurisdictions.

