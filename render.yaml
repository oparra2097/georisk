services:
  - type: web
    name: georisk-monitor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:create_app() --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: NEWSAPI_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
