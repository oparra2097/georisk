{% extends "base.html" %}
{% block title %}Data - Parra Macro{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/data.css">
{% endblock %}

{% block content %}
<div class="data-page">
    <div class="data-layout">
        <!-- Left Sidebar Navigation (Phase 2: dynamic from catalog) -->
        <aside class="data-sidebar">
            <div class="sidebar-search-box">
                <input type="text" id="sidebar-search-input" class="sidebar-search" placeholder="Search datasets... (Ctrl+K)">
            </div>
            <nav id="sidebar-nav">
                <!-- Populated dynamically by data.js from DATA_CATALOG -->
            </nav>
        </aside>

        <!-- Main Content Area -->
        <div class="data-content">
            <!-- Breadcrumb (Phase 2 + Phase 4 mobile tap targets) -->
            <div class="data-breadcrumb" id="data-breadcrumb"></div>

            <!-- Pill Tab Strip (Phase 2: subviews as horizontal tabs) -->
            <div class="dataset-tab-strip" id="dataset-tabs"></div>

            <!-- Single Dynamic Panel (replaces 11 pre-built sections) -->
            <div id="active-panel">
                <div class="chart-loading">
                    <div class="spinner"></div>
                    <p>Loading data...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Search Overlay (Phase 3: Ctrl+K command palette) -->
<div class="search-overlay" id="search-overlay" style="display:none;">
    <div class="search-modal">
        <input type="text" id="search-input" class="search-input" placeholder="Search datasets, components, countries..." autocomplete="off">
        <div class="search-results" id="search-results"></div>
    </div>
</div>

<!-- Mobile Bottom Sheet (Phase 4) -->
<div class="bottom-sheet-overlay" id="bottom-sheet-overlay"></div>
<div class="bottom-sheet" id="bottom-sheet">
    <div class="bottom-sheet-handle"></div>
    <button class="bottom-sheet-close">&times;</button>
    <div class="bottom-sheet-search">
        <input type="text" id="bottom-sheet-search-input" placeholder="Filter datasets..." autocomplete="off">
    </div>
    <div class="bottom-sheet-content" id="bottom-sheet-content"></div>
</div>

<!-- Mobile Nav Bar -->
<div class="mobile-nav-bar" id="mobile-nav-bar">
    <button class="mobile-nav-btn" id="mobile-nav-browse">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span>Browse</span>
    </button>
    <button class="mobile-nav-btn" id="mobile-nav-search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Search</span>
    </button>
</div>
{% endblock %}

{% block scripts %}
<script>window.ParraData = window.ParraData || {}; window.ParraData.isAuthenticated = {{ 'true' if is_authenticated is defined and is_authenticated else 'false' }};</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<script src="/static/js/data-catalog.js?v=8"></script>
<script src="/static/js/data-state.js?v=8"></script>
<script src="/static/js/data.js?v=8"></script>
{% endblock %}
