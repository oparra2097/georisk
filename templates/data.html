{% extends "base.html" %}
{% block title %}Data - Parra Macro{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/data.css">
{% endblock %}

{% block content %}
<div class="data-page">
    <div class="data-layout">
        <!-- Left Sidebar Navigation (Phase 2: dynamic from catalog) -->
        <aside class="data-sidebar">
            <div class="sidebar-search-box">
                <input type="text" id="sidebar-search-input" class="sidebar-search" placeholder="Search datasets... (Ctrl+K)">
            </div>
            <nav id="sidebar-nav">
                <!-- Populated dynamically by data.js from DATA_CATALOG -->
            </nav>
        </aside>

        <!-- Main Content Area -->
        <div class="data-content">
            <!-- Breadcrumb (Phase 2 + Phase 4 mobile tap targets) -->
            <div class="data-breadcrumb" id="data-breadcrumb"></div>

            <!-- Pill Tab Strip (Phase 2: subviews as horizontal tabs) -->
            <div class="dataset-tab-strip" id="dataset-tabs"></div>

            <!-- Single Dynamic Panel (replaces 11 pre-built sections) -->
            <div id="active-panel">
                <div class="chart-loading">
                    <div class="spinner"></div>
                    <p>Loading data...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Search Overlay (Phase 3: Ctrl+K command palette) -->
<div class="search-overlay" id="search-overlay" style="display:none;">
    <div class="search-modal">
        <input type="text" id="search-input" class="search-input" placeholder="Search datasets, components, countries..." autocomplete="off">
        <div class="search-results" id="search-results"></div>
    </div>
</div>

<!-- Mobile Bottom Sheet (Phase 4) -->
<div class="bottom-sheet-overlay" id="bottom-sheet-overlay"></div>
<div class="bottom-sheet" id="bottom-sheet">
    <div class="bottom-sheet-handle"></div>
    <button class="bottom-sheet-close">&times;</button>
    <div class="bottom-sheet-content" id="bottom-sheet-content"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="/static/js/data-catalog.js"></script>
<script src="/static/js/data-state.js"></script>
<script src="/static/js/data.js"></script>
{% endblock %}
