{% extends "base.html" %}
{% block title %}Email Verified - Parra Macro{% endblock %}

{% block extra_css %}
<style>
    .auth-container { display: flex; justify-content: center; align-items: center; min-height: 70vh; padding: 20px; }
    .auth-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; text-align: center; }
    .auth-title { color: #f1f5f9; font-size: 24px; font-weight: 700; margin: 0 0 8px; }
    .auth-subtitle { color: #64748b; font-size: 14px; margin: 0 0 24px; }
    .auth-check { color: #10b981; font-size: 48px; margin-bottom: 16px; }
    .auth-btn { display: inline-block; padding: 12px 24px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; text-decoration: none; }
    .auth-btn:hover { background: #2563eb; }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-check">&#10003;</div>
        <h1 class="auth-title">Email Verified</h1>
        <p class="auth-subtitle">{{ email }} has been verified successfully.</p>
        <a href="/data" class="auth-btn">Go to Data</a>
    </div>
</div>
{% endblock %}
